<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        color: #333;
      }

      .wrap {
        width: 1400px;
        max-width: 1400px;
        margin: 0 auto;
        padding: 48px 36px;
        background: linear-gradient(180deg, #f8faff 0%, #fffcf8 100%);
        min-height: 100vh;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .title {
        font-size: 36px;
        font-weight: 700;
        color: #002864;
        margin-bottom: 12px;
      }

      .subtitle {
        font-size: 18px;
        color: #505050;
      }

      .cards-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      .card {
        background: #ffffff;
        border: 1px solid #dce1eb;
        border-radius: 12px;
        padding: 20px;
      }

      .card-command {
        font-size: 22px;
        font-weight: 700;
        color: #0a468c;
        margin-bottom: 8px;
      }

      .card-desc {
        font-size: 16px;
        color: #464646;
        margin-bottom: 10px;
        line-height: 1.4;
      }

      .card-example {
        font-size: 14px;
        color: #646464;
        font-family: monospace;
        background: #f0f2f8;
        padding: 6px 10px;
        border-radius: 4px;
        display: inline-block;
      }

      .footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 20px;
        border-top: 1px solid #e8eaef;
      }

      .footer-text {
        font-size: 16px;
        color: #646464;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="title">{{ title }}</div>
        <div class="subtitle">{{ subtitle }}</div>
      </div>

      <div class="cards-grid">
        {% for cmd in commands %}
        <div class="card">
          <div class="card-command">{{ cmd.name }}</div>
          <div class="card-desc">{{ cmd.desc }}</div>
          <div class="card-example">{{ cmd.example }}</div>
        </div>
        {% endfor %}
      </div>

      <div class="footer">
        <div class="footer-text">发送命令即可使用，如 /one 李华 或 /pr 2026LIHU01 1234</div>
      </div>
    </div>
  </body>
</html>
